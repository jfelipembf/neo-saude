<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1024" role="img" aria-label="Rede de especialidades de saúde conectadas, com a marca Neo Saúde">
  <defs>
    <!-- Campo verde da marca, do topo mais claro ao rodapé mais profundo. -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="0.55" stop-color="#10B981"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>

    <!-- Brilhos suaves (profundidade, sem pessoas nem fotos). -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ECFDF5" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ECFDF5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="deep" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#064E3B" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#064E3B" stop-opacity="0"/>
    </radialGradient>

    <filter id="badgeShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#064E3B" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="1440" height="1024" fill="url(#bg)"/>
  <ellipse cx="360" cy="290" rx="560" ry="460" fill="url(#glow)"/>
  <ellipse cx="1240" cy="900" rx="640" ry="520" fill="url(#deep)"/>

  <!-- Órbita decorativa por trás da rede (só profundidade, sem textura de fundo). -->
  <path d="M140 700C90 470 260 240 500 190C760 136 1000 280 1060 520C1108 712 1010 895 830 984"
        fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2" stroke-linecap="round"/>

  <!-- Logo Neo Saúde, revertida em branco para contraste no verde. Posicionada
       com folga do topo: o fundo é `background-size: cover`, então telas mais
       largas que 1440:1024 cortam as bordas verticais primeiro. -->
  <g transform="translate(370,168) scale(0.62)" fill="#F7FFFB">
    <path d="M103.81,76.42L35.5,5.04c-2.84-3.35-6.7-5.04-11.49-5.04h-10.8C4.56,0,0,4.37,0,12.63v85.87h22.35V22.22l68.31,71.1c2.65,3.44,6.51,5.18,11.49,5.18h10.8c8.64,0,13.2-4.42,13.2-12.78V0h-22.35v76.42h.01Z"/>
    <polygon points="161.49 56.39 218.94 56.39 218.94 39.41 137.49 39.41 137.49 98.5 250.3 98.5 250.3 79.56 161.49 79.56 161.49 56.39"/>
    <rect x="137.49" width="112.81" height="19.24"/>
    <path d="M352.25,0h-64.5c-18.02,0-27.15,8.35-27.15,24.81v48.88c0,16.46,9.14,24.81,27.15,24.81h64.5c18.02,0,27.15-8.35,27.15-24.81V24.81c0-16.46-9.13-24.81-27.15-24.81ZM354.65,28.27v41.96c0,6.14-2.92,8.88-9.45,8.88h-50.4c-6.54,0-9.45-2.74-9.45-8.88V28.27c0-6.24,2.91-9.03,9.45-9.03h50.4c6.54,0,9.45,2.78,9.45,9.03Z"/>
  </g>

  <!-- ── Rede das 5 especialidades: Medicina no centro (hub), as outras quatro
       ligadas a ela por um traço — a leitura é "um app, várias especialidades". ── -->

  <!-- Traços (atrás dos nós, ponta a ponta — o círculo opaco cobre a sobra). -->
  <g stroke="#ffffff" stroke-opacity="0.45" stroke-width="2" stroke-linecap="round">
    <line x1="470" y1="540" x2="470" y2="330"/>
    <line x1="470" y1="540" x2="690" y2="540"/>
    <line x1="470" y1="540" x2="470" y2="750"/>
    <line x1="470" y1="540" x2="250" y2="540"/>
  </g>
  <!-- Pontos de "fluxo" ao longo de cada traço. -->
  <g fill="#ffffff" fill-opacity="0.6">
    <circle cx="470" cy="470" r="3.5"/>
    <circle cx="470" cy="400" r="3.5"/>
    <circle cx="580" cy="540" r="3.5"/>
    <circle cx="620" cy="540" r="3.5"/>
    <circle cx="470" cy="620" r="3.5"/>
    <circle cx="470" cy="680" r="3.5"/>
    <circle cx="360" cy="540" r="3.5"/>
    <circle cx="320" cy="540" r="3.5"/>
  </g>

  <!-- MEDICINA (hub, centro) — estetoscópio -->
  <g transform="translate(470,540)">
    <circle r="72" fill="#ffffff" fill-opacity="0.96" filter="url(#badgeShadow)"/>
    <g fill="none" stroke="#047857" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-19 -28 C -21 -3 -7 9 0 9 C 7 9 21 -3 19 -28"/>
      <path d="M0 9 L0 21"/>
      <circle cx="0" cy="29" r="8.2"/>
      <circle cx="-19" cy="-28" r="3.6" fill="#047857" stroke="none"/>
      <circle cx="19" cy="-28" r="3.6" fill="#047857" stroke="none"/>
      <circle cx="0" cy="29" r="2.6" fill="#047857" stroke="none"/>
    </g>
  </g>

  <!-- ODONTOLOGIA (topo) — dente: coroa arredondada + duas raízes, num traço
       só (o desenho de dente mais padrão dos ícones do gênero). -->
  <g transform="translate(470,330)">
    <circle r="58" fill="#ffffff" fill-opacity="0.96" filter="url(#badgeShadow)"/>
    <path d="M-14 -21 C-14 -32 14 -32 14 -21 C14 -8 10 7 5 20 C4 23 1 23 0.5 15 C0 8 0 8 -0.5 15 C-1 23 -4 23 -5 20 C-10 7 -14 -8 -14 -21 Z"
          fill="none" stroke="#047857" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- NUTRIÇÃO (direita) — maçã: corpo com reentrância no topo + talo + folha
       (mesma anatomia do ícone de maçã padrão). -->
  <g transform="translate(690,540)">
    <circle r="58" fill="#ffffff" fill-opacity="0.96" filter="url(#badgeShadow)"/>
    <g fill="none" stroke="#047857" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 -9 C-10 -18 -23 -11 -23 4 C-23 20 -11 32 0 32 C11 32 23 20 23 4 C23 -11 10 -18 0 -9 Z"/>
      <path d="M0 -9 L2 -21"/>
      <path d="M2 -19 C10 -27 20 -23 18 -15 C10 -14 3 -16 2 -19 Z" fill="#047857" stroke="none"/>
    </g>
  </g>

  <!-- FISIOTERAPIA (baixo) — halteres -->
  <g transform="translate(470,750)">
    <circle r="58" fill="#ffffff" fill-opacity="0.96" filter="url(#badgeShadow)"/>
    <g fill="none" stroke="#047857" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-14 0 L14 0"/>
      <path d="M-14 -12 L-14 12"/>
      <path d="M-21 -8 L-21 8"/>
      <path d="M14 -12 L14 12"/>
      <path d="M21 -8 L21 8"/>
    </g>
  </g>

  <!-- PSICOLOGIA (esquerda) — símbolo Psi -->
  <g transform="translate(250,540)">
    <circle r="58" fill="#ffffff" fill-opacity="0.96" filter="url(#badgeShadow)"/>
    <g fill="none" stroke="#047857" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 -24 L0 26"/>
      <path d="M-12 26 L12 26"/>
      <path d="M-17 -22 L-17 -6"/>
      <path d="M17 -22 L17 -6"/>
      <path d="M-17 -6 C -17 12 17 12 17 -6"/>
    </g>
  </g>

  <!-- Folhas — acento botânico discreto no canto vazio, sem competir com a
       rede de ícones (que é o elemento principal). -->
  <g transform="translate(150,800)" fill="#F7FFFB" fill-opacity="0.22">
    <path d="M-4 22C-2 10 0 4 0 0" fill="none" stroke="#F7FFFB" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round"/>
    <g transform="rotate(-38)">
      <path d="M0 0C10 -17 34 -21 47 -7C40 10 13 14 0 0Z"/>
      <path d="M5 -4C16 -9 30 -11 41 -9" fill="none" stroke="#F7FFFB" stroke-opacity="0.32" stroke-width="1.6"/>
    </g>
    <g transform="rotate(-6)">
      <path d="M0 0C10 -17 34 -21 47 -7C40 10 13 14 0 0Z"/>
      <path d="M5 -4C16 -9 30 -11 41 -9" fill="none" stroke="#F7FFFB" stroke-opacity="0.32" stroke-width="1.6"/>
    </g>
    <g transform="rotate(26)">
      <path d="M0 0C10 -17 34 -21 47 -7C40 10 13 14 0 0Z"/>
      <path d="M5 -4C16 -9 30 -11 41 -9" fill="none" stroke="#F7FFFB" stroke-opacity="0.32" stroke-width="1.6"/>
    </g>
  </g>
</svg>
